# Publicly credit Sauce Labs because they generously support open source
# projects.
name: Frontend Tests

on:
  workflow_call:

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    name: Playwright (Node ${{ matrix.node }} / core ${{ matrix.core_ref || 'develop' }})
    strategy:
      fail-fast: false
      # Plugin floor is engines.node >=22 but current Etherpad core
      # requires >=24 (engineStrict). Each cell pairs a Node version
      # with a core ref that actually allows it: Node 22 against the
      # last tag whose core floor was 22 (v2.7.3); Node 24 / 26 against
      # current develop.
      matrix:
        include:
          - node: '22'
            core_ref: 'v2.7.3'
          - node: '24'
            core_ref: ''
          - node: '26'
            core_ref: ''

    steps:
      -
        name: Check out Etherpad core
        uses: actions/checkout@v6
        with:
          repository: ether/etherpad-lite
          ref: ${{ matrix.core_ref }}
          path: etherpad-lite
      - uses: actions/setup-node@v6
        name: Install Node.js
        with:
          node-version: ${{ matrix.node }}
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          package_json_file: ./etherpad-lite/package.json
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      -
        name: Checkout plugin repository
        uses: actions/checkout@v6
        with:
          path: plugin
      -
        name: Install Etherpad core dependencies
        working-directory: ./etherpad-lite
        run: bin/installDeps.sh
      - name: Install plugin
        working-directory: ./etherpad-lite
        run: |
          pnpm run plugins i --path ../../plugin
      - name: Create settings.json
        working-directory: ./etherpad-lite
        run: cp ./src/tests/settings.json settings.json
      # Etherpad v2.7.x added a "severely outdated" version-badge that polls
      # GitHub for the latest release and renders an absolutely-positioned
      # banner at top-right when the running core is a full major behind.
      # Now that 3.x is tagged on GitHub, this matrix cell (core v2.7.3)
      # sees latest=3.x, paints the banner, and the banner intercepts
      # pointer events on #chaticon — every chat-related Playwright test
      # times out. Set updates.tier=off so /api/version-status is never
      # registered and the badge stays hidden. Harmless no-op on cores
      # without the updater (older tags, develop with tier already off).
      - name: Disable updater poll in test settings
        working-directory: ./etherpad-lite
        run: |
          node -e 'const fs=require("fs");const s=JSON.parse(fs.readFileSync("settings.json","utf8"));s.updates={...(s.updates||{}),tier:"off"};fs.writeFileSync("settings.json",JSON.stringify(s,null,2));'
      - name: Run the frontend tests
        working-directory: ./etherpad-lite
        shell: bash
        run: |
          pnpm run dev &
          connected=false
          can_connect() {
            curl -sSfo /dev/null http://localhost:9001/ || return 1
            connected=true
          }
          now() { date +%s; }
          start=$(now)
          while [ $(($(now) - $start)) -le 30 ] && ! can_connect; do
            sleep 1
          done
          cd src
          pnpm exec playwright install chromium --with-deps
          pnpm run test-ui --project=chromium
